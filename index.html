<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Profile</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.profile-card{
    width:350px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:30px;
    text-align:center;
    color:white;
    box-shadow:0 0 30px rgba(0,0,0,0.4);
}

.profile-card img{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #38bdf8;
}

.profile-card h1{
    margin-top:15px;
    font-size:28px;
}

.profile-card p{
    margin-top:10px;
    color:#cbd5e1;
}

.socials{
    margin-top:20px;
}

.socials a{
    text-decoration:none;
    color:white;
    margin:0 10px;
    font-size:18px;
    transition:0.3s;
}

.socials a:hover{
    color:#38bdf8;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:10px 25px;
    background:#38bdf8;
    color:white;
    text-decoration:none;
    border-radius:30px;
    transition:0.3s;
}

.btn:hover{
    background:#0ea5e9;
}
</style>
</head>

<body>

<div class="profile-card">
    <img src="https://raw.githubusercontent.com/mdimrankhanalpha/Photos-7777/main/1000949299.jpg" alt="Profile Photo">

    <h1>Alpha</h1>

    <p>Web Developer • Gamer • Tech Enthusiast</p>

    <div class="socials">
        <a href="#">Facebook</a>
        <a href="#">GitHub</a>
        <a href="#">Discord</a>
    </div>

    <a href="#" class="btn">Contact Me</a>
</div>

</body>
</html>
